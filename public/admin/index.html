<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RazaTech Admin — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">Raza<span>Tech</span></div>
      <p class="login-sub">Admin Panel — Secure Access</p>
      <form id="loginForm" novalidate>
        <div class="form-group"><label>Username</label><input type="text" id="lu" placeholder="admin" autocomplete="username"/></div>
        <div class="form-group"><label>Password</label><input type="password" id="lp" placeholder="••••••••" autocomplete="current-password"/></div>
        <div class="login-error" id="loginErr" style="display:none">Invalid credentials. Try again.</div>
        <button type="submit" class="btn-login">Sign In</button>
      </form>
      
    </div>
  </div>
  <script>
    if (sessionStorage.getItem('rt_admin') === 'true') window.location.href = 'dashboard.html';
    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      if (document.getElementById('lu').value.trim() === 'razatech_admin' &&
          document.getElementById('lp').value === 'Razak.ug2026') {
        sessionStorage.setItem('rt_admin', 'true');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('loginErr').style.display = 'block';
      }
    });
  </script>
</body>
</html>
